# ============================================
# DeadlineGuard API Configuration
# ============================================
server.port=${PORT:8080}
app.frontend.url=${FRONTEND_URL:http://localhost:5173}

# PostgreSQL Database
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/deadlineguard}
spring.datasource.username=${DATABASE_USER:postgres}
spring.datasource.password=${DATABASE_PASSWORD:postgres}
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Scheduling
spring.task.scheduling.enabled=true

# Google Gemini API
gemini.api.key=YOUR_GEMINI_API_KEY
gemini.api.url=https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent

# Logging
logging.level.com.deadlineguard=INFO
logging.level.org.springframework.security=WARN

# ============================================
# GitHub OAuth2
# Callback URL: http://localhost:8080/login/oauth2/code/github
# ============================================
spring.security.oauth2.client.registration.github.client-id=Ov23liHHUs3mrpJTVpAn
spring.security.oauth2.client.registration.github.client-secret=YOUR_GITHUB_SECRET
spring.security.oauth2.client.registration.github.scope=read:user,user:email

# ============================================
# Google OAuth2 (for login and Calendar sync)
# Callback URL: http://localhost:8080/login/oauth2/code/google
# ============================================
spring.security.oauth2.client.registration.google.client-id=950822922818-tekgu7rmrn4148ujkdi4ndpqfgslo13h.apps.googleusercontent.com
spring.security.oauth2.client.registration.google.client-secret=YOUR_GOOGLE_SECRET
spring.security.oauth2.client.registration.google.scope=openid,profile,email,https://www.googleapis.com/auth/calendar.readonly,https://www.googleapis.com/auth/calendar.events

# Where to send the user after successful GitHub login
app.auth.success-url=${app.frontend.url}
app.auth.failure-url=${app.frontend.url}/login?error=true
